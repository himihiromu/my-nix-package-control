services:
  nixos-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nixos-test-env
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - nix-store:/nix
    environment:
      NIX_CONFIG: experimental-features = nix-command flakes
    stdin_open: true
    tty: true
    command: /root/.nix-profile/bin/bash

volumes:
  nix-store:
    driver: local
